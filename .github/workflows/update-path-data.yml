name: Update PATH Ridership Data

on:
  schedule:
    - cron: '0 10 * * *'  # Daily at 10am UTC
  workflow_dispatch:

env:
  GIT_AUTHOR_NAME: "GitHub Actions"
  GIT_AUTHOR_EMAIL: "path-ridership-data@hudcostreets.org"
  GIT_COMMITTER_NAME: "GitHub Actions"
  GIT_COMMITTER_EMAIL: "path-ridership-data@hudcostreets.org"

jobs:
  update-data:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - run: pip install -e .

      - name: Check for new PDFs
        run: path-data refresh -c

      - name: Run pipeline
        run: dvx run

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "changes=false" >> $GITHUB_OUTPUT
          else
            echo "changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Push data to S3
        if: steps.check.outputs.changes == 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: dvx push

      - name: Commit and push
        if: steps.check.outputs.changes == 'true'
        run: |
          git add -u
          git commit -m "Update PATH ridership data"
          git push
