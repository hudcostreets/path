name: Update PATH Ridership Data

on:
  schedule:
    - cron: '0 10 * * *'  # Daily at 10am UTC
  workflow_dispatch:
    inputs:
      skip_slack:
        type: boolean
        description: "Skip posting to Slack (for testing)"
        default: false

env:
  GIT_AUTHOR_NAME: "GitHub Actions"
  GIT_AUTHOR_EMAIL: "path-ridership-data@hudcostreets.org"
  GIT_COMMITTER_NAME: "GitHub Actions"
  GIT_COMMITTER_EMAIL: "path-ridership-data@hudcostreets.org"
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_DEFAULT_REGION: us-east-1
  SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
  SLACK_CHANNEL_ID: ${{ vars.SLACK_CHANNEL_ID }}

jobs:
  update-data:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      actions: write  # dispatch www.yml after data update

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - run: pip install -e .

      - name: Run daily update
        env:
          PATH_DATA_SKIP_SLACK: ${{ inputs.skip_slack && '1' || '' }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: path-data gha-update
