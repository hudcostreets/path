name: Update PATH Ridership Data

on:
  schedule:
    - cron: '0 10 * * *'  # Daily at 10am UTC
  workflow_dispatch:

env:
  GIT_AUTHOR_NAME: "GitHub Actions"
  GIT_AUTHOR_EMAIL: "path-ridership-data@hudcostreets.org"
  GIT_COMMITTER_NAME: "GitHub Actions"
  GIT_COMMITTER_EMAIL: "path-ridership-data@hudcostreets.org"
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_DEFAULT_REGION: us-east-1
  SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
  SLACK_CHANNEL_ID: ${{ vars.SLACK_CHANNEL_ID }}

jobs:
  update-data:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - run: pip install -e .

      - name: Run daily update
        run: path-data gha-update

      - name: Notify Slack (unhandled failure)
        if: failure()
        continue-on-error: true
        run: >-
          path-data slack
          ":rotating_light: *PATH pipeline crashed* (uncaught)
          <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View GHA run>"
          --icon-emoji :rotating_light:
