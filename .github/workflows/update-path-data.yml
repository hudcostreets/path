name: Update PATH Ridership Data

on:
  # Poll daily at 10am UTC (5am EST / 6am EDT)
  schedule:
    - cron: '0 10 * * *'

  # Allow manual triggering
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e .

      - name: Check for new data
        id: check
        run: |
          path-data refresh

          # Check if there are changes
          if git diff --quiet data/*.pdf; then
            echo "changes=false" >> $GITHUB_OUTPUT
            echo "No new data available"
          else
            echo "changes=true" >> $GITHUB_OUTPUT
            echo "New data found!"
          fi

      - name: Process new data
        if: steps.check.outputs.changes == 'true'
        run: |
          path-data update
          path-data combine

      - name: Push data to S3
        if: steps.check.outputs.changes == 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: dvx push

      - name: Create Pull Request
        if: steps.check.outputs.changes == 'true'
        id: pr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: |
            Update PATH ridership data ($(date +%Y-%m))

            Automated data update
          branch: update-path-data-${{ github.run_number }}
          delete-branch: true
          title: 'Update PATH ridership data'
          body: |
            Automated update of PATH ridership data from PANYNJ.

            - Downloaded latest monthly/hourly ridership PDFs
            - Parsed and updated parquet files
            - Updated combined dataset and chart specs
            - Pushed data to S3

            ---
            Generated by [GitHub Actions](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          labels: |
            automated
            data-update
