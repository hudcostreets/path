name: Deploy www
on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'www/**'
      - 'www/public/**/*.dvc'
      - '.dvc/config'
jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-east-1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
      - run: pip install -e .
      # Pull www/public/* DVX artifacts from S3 so the built SPA has data files
      # at the content-addressed URLs that `vite-plugin-dvc` resolves to.
      - name: Pull www/public DVX artifacts
        run: dvx pull --glob 'www/public/*.dvc'
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: www/pnpm-lock.yaml
      - working-directory: www
        run: pnpm install
      - working-directory: www
        run: pnpm run build
      - name: Copy index.html to 404.html for SPA routing
        run: cp www/dist/index.html www/dist/404.html
      - name: Install Playwright browsers
        working-directory: www
        run: npx playwright install --with-deps chromium
      - name: Run e2e tests
        working-directory: www
        run: npx playwright test
      - name: Deploy to GH Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: www/dist
